name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/utc-milter

  apk:
    name: Alpine APK
    runs-on: ubuntu-latest
    needs: go
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build APK
        env:
          ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
        run: |
          if [ -z "${ABUILD_PRIVATE_KEY}" ]; then
            echo "ABUILD_PRIVATE_KEY GitHub Actions secret is required" >&2
            exit 1
          fi

          set -eux
          docker run --rm \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e ABUILD_PRIVATE_KEY="${ABUILD_PRIVATE_KEY}" \
            -v "$PWD":/work \
            -w /work \
            alpine:edge \
            sh -euxc '
              apk add --no-cache alpine-sdk go git sudo tar gzip
              git config --global --add safe.directory /work

              adduser -D builder
              addgroup builder abuild
              echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
              chown -R builder:builder /work

              install -d -m 0775 -o builder -g abuild /var/cache/distfiles
              install -d -m 0755 -o builder -g builder /home/builder/.abuild
              printf "%s\n" "${ABUILD_PRIVATE_KEY}" > /home/builder/.abuild/utc-milter.rsa
              install -m 0644 utc-milter.rsa.pub /home/builder/.abuild/utc-milter.rsa.pub
              chown builder:builder /home/builder/.abuild/utc-milter.rsa /home/builder/.abuild/utc-milter.rsa.pub
              chmod 0600 /home/builder/.abuild/utc-milter.rsa
              printf "PACKAGER_PRIVKEY=/home/builder/.abuild/utc-milter.rsa\n" > /home/builder/.abuild/abuild.conf
              chown builder:builder /home/builder/.abuild/abuild.conf
              chmod 0600 /home/builder/.abuild/abuild.conf
              cp /home/builder/.abuild/utc-milter.rsa.pub /etc/apk/keys/

              pkgver="$(sed -n "s/^pkgver=//p" packaging/alpine/APKBUILD)"
              pkgname="$(sed -n "s/^pkgname=//p" packaging/alpine/APKBUILD)"
              tarball="/var/cache/distfiles/${pkgname}-${pkgver}.tar.gz"
              tmpdir="$(mktemp -d)"
              mkdir -p "${tmpdir}/${pkgname}-${pkgver}"

              git ls-files -z > "${tmpdir}/files"
              tar --null -T "${tmpdir}/files" -cf - | tar -C "${tmpdir}/${pkgname}-${pkgver}" -xf -
              tar -C "${tmpdir}" -czf "${tarball}" "${pkgname}-${pkgver}"
              tar -tzf "${tarball}" | grep -qx "${pkgname}-${pkgver}/cmd/utc-milter/main.go"
              install -m 0644 packaging/alpine/utc-milter.initd /var/cache/distfiles/utc-milter.initd
              install -m 0644 packaging/alpine/utc-milter.confd /var/cache/distfiles/utc-milter.confd

              cd packaging/alpine
              sudo -u builder sed -i "s#${pkgname}-${pkgver}.tar.gz::https://github.com/kruton/utc-milter/archive/refs/tags/v\$pkgver.tar.gz#${pkgname}-${pkgver}.tar.gz#" APKBUILD
              sudo -u builder abuild checksum
              sudo -u builder abuild -r

              arch="$(apk --print-arch)"
              mkdir -p /work/dist/apks "/work/dist/repo/${arch}"
              find /home/builder/packages -name "*.apk" -exec cp -v {} /work/dist/apks/ \;
              cp -v /work/dist/apks/*.apk "/work/dist/repo/${arch}/"
              cp -v /home/builder/.abuild/utc-milter.rsa.pub /work/dist/repo/utc-milter.rsa.pub
              chown -R builder:builder /work/dist

              sudo -u builder sh -euxc "
                cd /work/dist/repo/${arch}
                apk index -o APKINDEX.tar.gz *.apk
                abuild-sign APKINDEX.tar.gz
              "
            '

      - name: Upload Alpine artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-artifacts
          path: dist
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: apk
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Validate semver tag
        id: semver
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download APK artifacts
        if: steps.semver.outputs.valid == 'true'
        uses: actions/download-artifact@v4
        with:
          name: alpine-artifacts
          path: dist

      - name: Create or update GitHub release
        if: steps.semver.outputs.valid == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/apks/*.apk
          fail_on_unmatched_files: true

  pages:
    name: Alpine Repository
    runs-on: ubuntu-latest
    needs: apk
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Validate semver tag
        id: semver
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Alpine repository
        if: steps.semver.outputs.valid == 'true'
        uses: actions/download-artifact@v4
        with:
          name: alpine-artifacts
          path: dist

      - name: Configure Pages
        if: steps.semver.outputs.valid == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.semver.outputs.valid == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/repo

      - name: Deploy Alpine repository
        if: steps.semver.outputs.valid == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
